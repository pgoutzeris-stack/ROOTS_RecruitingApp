g ist uns dich besser kennenzulernen und deine Herangehensweise zu verstehen.\n\nBereit? Dann starten wir.`,p=`• Agile Boutique
• Liefern KI-optimierte Markenstrategien und Marketing Operations
• Damit verhelfen wir unseren Blue-Ship Kunden zu mehr Wirksamkeit, Effizienz und Speed im Marketing
• Produktportfolio richtet sich nach unserem eigenen Modell, den 6Ps
• Fokusbranchen: FMCG & Retail (tiefe Expertise für Eigenmarken)
• Kunden sind z.\xA0B. Danone, Beiersdorf, Lidl, TUI
• Die wir teilweise seit unserer Gründung in 2016 beraten
• Werte: excellent, führend, nahbar
• Praxis-Profis, keine „Theorie-Berater“
• Wichtig: Wir sind sehr klein (6 Personen), möchten wachsen (> 10 > 20), sind selbst in der KI-Transformation`,m=e=>`Vielen Dank, ${e||`[Name]`}. Zum Abschluss möchten wir Dir noch Raum für deine Fragen geben und kurz die nächsten Schritte erklären.\n\nHast du noch Fragen?\n\nNachfragen:\n\u2022 Wie stellst du dir den Arbeitsaufwand in der Marketingberatung vor?\n\u2022 Wie viel Reisetätigkeit findest du ok?\n\u2022 Welchen Split Office / Home Office findest Du ideal? Wäre möglich?\n\u2022 Was verdienst du aktuell und was möchtest du verdienen?\n\u2022 Wann könntest Du einsteigen?\n\nVielen Dank für das Gespräch und Deine Offenheit. Wir führen in den nächsten Tagen weitere Gespräche und melden uns spätestens in einer Woche bei Dir.\nDie nächsten Schritte wären ein Zweitinterview und ein Case Interview vor Ort.\n\nWir freuen uns, von Dir zu hören und melden uns wie angekündigt.`,h=`Damit kommen wir zum Abschluss. Doch zuvor, hast du noch Fragen?

Vielen Dank für das Gespräch und Deine Offenheit. Wir führen in den nächsten Tagen weitere Gespräche und melden uns spätestens nächste Woche bei Dir.
Der nächste Schritt wäre eine Case bei uns vor Ort in Düsseldorf.

Vielen Dank für Deine Zeit und Dein Interesse. Wir freuen uns, von Dir zu hören und melden uns wie angekündigt.`,g=`• Als Junior arbeitest du von Anfang an sehr nah am Kunden, d.\xA0h. Shadowing in Meetings, frühes Halten von Präsentationsteilen und direkte Kommunikation
• Ein großer Teil der Arbeit besteht aus Analyse, Strukturierung und PowerPoint-Ausarbeitungen auf hohem Qualitätsniveau
• Als kleines Team gibt es wenig Schutzraum – frühe Eigenverantwortung, parallele Themen sind normal
• Knappe Timings und kurzfristige Änderungen durch Kunden sind Alltag
• Besonders zum Projektende kann es sein, dass man länger bleiben muss – kein 9-5 Job
• Wir erwarten, dass du dich aktiv ins Team einbringst – z.\xA0B. nachfragen, ob man noch helfen kann
• Reisetätigkeit variiert je nach Kunde
• Wir haben noch wenige zementierte Strukturen und Abläufe – proaktiv mitgestalten
• Gleichzeitig: steile Lernkurve, viel Gestaltungsspielraum, wenig Bürokratie, direkter Zugang zu Entscheidern`,_=[`Beschränkt sich auf rollenrelevante Informationen`,`Präsentiert strukturiert und logisch aufgebaut`,`Formuliert eine klare persönliche Value Proposition / ein erkennbares Profil`,`Belegt Fähigkeiten mit konkreten Beispielen statt Floskeln`,`Stellt Bezug zur Position und ROOTS her`,`Tritt sicher und authentisch auf – weder überheblich noch zu selbstkritisch`,`Kommuniziert klar und verständlich, angemessenes Tempo und Sprache`],v=`Ein etablierter Konsumgüterhersteller in Deutschland bemerkt, dass der Absatz ihrer Kernmarke in den letzten 2 Jahren um 15\xA0% gesunken ist – trotz nach wie vor starker Markenposition (Top-3 in Zielgruppe). Das Management ist ratlos und fragt uns um Rat.

Was würdest Du als ersten Schritt empfehlen, um das Problem zu diagnostizieren und welche zwei strategischen Optionen würdest Du in einer Kurzanalyse prüfen wollen?`,y=`Ein großer deutscher Lebensmitteleinzelhändler betreibt eine Fashion-Eigenmarke. Die Marke ist stark mit Damenmode assoziiert, günstig positioniert und in Filialen präsent. Der Abverkauf erfolgt über Wühltische und Aktionsständer, die sich strukturell nicht ändern werden.

Online ist die Marke ausschließlich über die Händlerseite vertreten. Dort herrscht wenig Markenpräsenz und reine Commerce-Orientierung.

Der Retailer möchte die Marke stärken. Das Wettbewerbsumfeld ist intensiv. Digitale Kanäle gewinnen an Bedeutung.
